name: ML Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        echo "Running unit tests..."
        python tests/test_pipeline.py
    
    - name: Run ML pipeline
      run: |
        echo "Starting ML pipeline execution..."
        python main.py
    
    - name: Verify outputs
      run: |
        if [ -f "outputs/customer_segments.csv" ]; then
          echo "✅ Pipeline completed successfully"
          wc -l outputs/customer_segments.csv
        else
          echo "❌ Pipeline failed - outputs not generated"
          exit 1
        fi
    
    - name: Upload pipeline outputs
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: pipeline-outputs
        path: outputs/
        retention-days: 30
        if-no-files-found: error
    
    - name: Upload model artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: trained-models
        path: models/
        retention-days: 30
    
    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: tests/
        retention-days: 7