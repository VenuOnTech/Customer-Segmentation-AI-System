name: ML Pipeline

on:
  push:
    branches: ["main"]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Tests
      run: python tests/test_pipeline.py

    - name: Run Pipeline
      run: python main.py