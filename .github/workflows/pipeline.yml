name: ML Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download dataset from GitHub Release
        run: |
          mkdir -p data/raw
          echo "📥 Downloading Online_Retail.xlsx from GitHub Release..."

          # Download from GitHub Release Assets
          curl -L -o data/raw/Online_Retail.xlsx \
            "https://github.com/VenuOnTech/Customer-Segmentation-AI-System/releases/download/v1.0.0-data/Online_Retail.xlsx"

          # Verify download
          if [ -f "data/raw/Online_Retail.xlsx" ]; then
            echo "✅ Dataset downloaded successfully"
            ls -lh data/raw/Online_Retail.xlsx
          else
            echo "❌ Failed to download dataset"
            exit 1
          fi

      - name: Run tests
        run: |
          echo "🧪 Running unit tests..."
          python tests/test_pipeline.py

      - name: Run ML pipeline
        run: |
          echo "🚀 Starting ML pipeline with REAL data..."
          python main.py

      - name: Verify outputs
        run: |
          if [ -f "outputs/customer_segments.csv" ]; then
            echo "✅ Pipeline completed successfully with REAL data!"
            echo "📈 Output statistics:"
            wc -l outputs/customer_segments.csv
            head -3 outputs/customer_segments.csv
          else
            echo "❌ Pipeline failed - outputs not generated"
            exit 1
          fi

      - name: Upload pipeline outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: outputs/
          retention-days: 30
          if-no-files-found: error

      - name: Upload model artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          retention-days: 30

      - name: Pipeline Success Summary
        if: success()
        run: |
          echo "=========================================="
          echo "✅ ML PIPELINE EXECUTED SUCCESSFULLY"
          echo "=========================================="
          echo "✅ Data: Real Online Retail Dataset"
          echo "✅ Tests: All passed"
          echo "✅ Models: Trained & Versioned"
          echo "✅ Outputs: Generated"
          echo "=========================================="

      - name: Create GitHub Release with outputs
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: outputs/customer_segments.csv
          tag_name: v1.0.0-outputs-${{ github.run_number }}
          body: "ML Pipeline Results"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}